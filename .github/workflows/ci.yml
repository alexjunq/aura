name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-unit:
    name: Lint + Typecheck + Unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - run: pnpm typecheck

      - run: pnpm lint
        continue-on-error: true # ESLint warnings shouldn't block until rules stabilize

      - run: pnpm test:unit

  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura
          POSTGRES_DB: aura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aura"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aura:aura@localhost:5432/aura_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm --filter @aura/db migrate:deploy

      - run: pnpm test:integration
