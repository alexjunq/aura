name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-unit:
    name: Lint + Typecheck + Unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - run: pnpm typecheck

      - run: pnpm lint
        continue-on-error: true # ESLint warnings shouldn't block until rules stabilize

      - run: pnpm test:unit

  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura
          POSTGRES_DB: aura_test
        ports:
          - 7432:5432
        options: >-
          --health-cmd "pg_isready -U aura"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aura:aura@localhost:7432/aura_test?schema=public

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Same reason as the unit job: pnpm's allowBuilds runs @prisma/client's
      # postinstall but it can't find packages/db/prisma/schema.prisma from
      # within the .pnpm store, so the runtime client files don't get emitted.
      # The tests import `prisma` from @aura/db at module load — without this
      # step they fail with "@prisma/client did not initialize yet".
      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm --filter @aura/db migrate:deploy

      - run: pnpm test:integration

  publish-images:
    name: Publish to GHCR (${{ matrix.app }})
    needs: [lint-typecheck-unit, integration]
    # Only push on a real merge to main; PRs build but don't publish (covered
    # implicitly because publish never runs on pull_request events).
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [web, worker]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/<repo>/<app>, e.g. ghcr.io/alexjunq/aura/web
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — reused across runs of this matrix branch.
          cache-from: type=gha,scope=aura-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=aura-${{ matrix.app }}
