## AURA — production stack (Phase 9 finalized).
##
## Required env (provided via `.env` next to this file):
##   AURA_HOST=aura.example.com
##   AURA_PHOTOS_HOST=photos.aura.example.com
##   POSTGRES_USER=aura
##   POSTGRES_PASSWORD=...
##   POSTGRES_DB=aura
##   DATABASE_URL=postgresql://aura:...@postgres:5432/aura?schema=public
##   NEXTAUTH_SECRET=...
##   NEXTAUTH_URL=https://${AURA_HOST}
##   EMAIL_PROVIDER=resend
##   EMAIL_API_KEY=re_...
##   EMAIL_FROM=hello@aura.example.com
##   GOOGLE_CLIENT_ID/SECRET (optional)
##   S3_ENDPOINT=https://${AURA_PHOTOS_HOST}
##   S3_PUBLIC_URL=https://${AURA_PHOTOS_HOST}
##   S3_REGION=us-east-1
##   S3_BUCKET=aura
##   S3_ACCESS_KEY/S3_SECRET_KEY=...  (must match MINIO_ROOT_USER/PASSWORD)
##   COMMODITY_PROVIDER=metals_dev
##   COMMODITY_API_KEY=...
##   FX_PROVIDER=frankfurter
##   RETENTION_DAYS=14

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      AURA_HOST: ${AURA_HOST:?required}
      AURA_PHOTOS_HOST: ${AURA_PHOTOS_HOST:?required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - minio

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:?required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/healthz"]
      interval: 15s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/healthz"]
      interval: 15s
      retries: 5

  backup:
    build:
      context: ./backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      RETENTION_DAYS: ${RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
